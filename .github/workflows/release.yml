name: Create Extension Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create extension zip
        run: |
          # Create a zip file with all extension files
          zip -r aniworld-extension.zip \
            manifest.json \
            background.js \
            content-main.js \
            content-player.js \
            popup.html \
            popup.css \
            popup.js \
            README.md \
            -x "*.git*" ".github/*"

      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: aniworld-extension.zip
          body: |
            # AniWorld Helper Extension Release ${{ steps.version.outputs.VERSION }}

            ## Installation Instructions

            1. **Download** the `aniworld-extension.zip` file from this release
            2. **Extract** the zip file to a folder on your computer
            3. Open **Chrome** or **Microsoft Edge**
            4. Navigate to `chrome://extensions` (Chrome) or `edge://extensions` (Edge)
            5. Enable **Developer Mode** (toggle in the top-right corner)
            6. Click **Load unpacked** and select the extracted folder
            7. Pin the extension to your toolbar for quick access

            ## Features

            - ⏭️ Auto-Next Episode
            - ⏩ Intro Skip
            - ⏮️ Outro Skip
            - 🎛️ Per-Anime Settings

            For more information, visit the [repository](https://github.com/SaufGott/Aniworld-extension)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
